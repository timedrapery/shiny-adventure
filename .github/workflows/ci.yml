name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Validate term schema
        run: python scripts/validate_terms.py --strict
      - name: Run editorial lint
        run: python scripts/lint_terms.py --strict
      - name: Check translation drift
        run: python scripts/check_translation_drift.py --strict
      - name: Check cluster surfaces
        run: python scripts/check_cluster_surfaces.py
      - name: Run test suite
        run: python -m unittest discover -s tests
      - name: Run full verification suite
        run: python scripts/run_checks.py
      - name: Export repo health JSON
        run: python scripts/repo_health.py --format json > repo-health.json
      - name: Upload repo health artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-health-py${{ matrix.python-version }}
          path: repo-health.json
