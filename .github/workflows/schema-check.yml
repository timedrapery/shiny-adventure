name: Schema Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-terms:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema

      - name: Validate term files against schema
        run: |
          python <<'PY'
          import json
          import sys
          from pathlib import Path

          from jsonschema import Draft202012Validator

          schema_path = Path("schema/pali_term.schema.json")
          terms_dir = Path("terms")

          if not schema_path.exists():
              print(f"ERROR: Schema file not found: {schema_path}")
              sys.exit(1)

          if not terms_dir.exists():
              print(f"ERROR: Terms directory not found: {terms_dir}")
              sys.exit(1)

          with schema_path.open("r", encoding="utf-8") as f:
              schema = json.load(f)

          validator = Draft202012Validator(schema)

          failures = []

          term_files = sorted(terms_dir.glob("*.json"))
          if not term_files:
              print("WARNING: No term files found in terms/")
              sys.exit(0)

          for term_file in term_files:
              try:
                  with term_file.open("r", encoding="utf-8") as f:
                      data = json.load(f)
              except json.JSONDecodeError as e:
                  failures.append(f"{term_file}: invalid JSON: {e}")
                  continue

              errors = sorted(validator.iter_errors(data), key=lambda e: list(e.path))
              for error in errors:
                  path = ".".join(str(p) for p in error.path) or "<root>"
                  failures.append(f"{term_file}: {path}: {error.message}")

          if failures:
              print("Schema validation failed:\n")
              for failure in failures:
                  print(f"- {failure}")
              sys.exit(1)

          print(f"Validated {len(term_files)} term file(s) successfully.")
          PY
